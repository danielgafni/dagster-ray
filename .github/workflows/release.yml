name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:

env:
  UV_SYSTEM_PYTHON: "1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    environment:
      name: release
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: 0.11.8
          enable-cache: true
      - name: Set up Python
        run: uv python install $PYTHON_VERSION && uv python pin $PYTHON_VERSION
        env:
          PYTHON_VERSION: 3.11.9
      - name: Set Version
        run: VERSION=$(uv version --short) && echo "Version is $VERSION" && echo "VERSION=$VERSION" >> $GITHUB_ENV
      - name: Publish to PyPI
        run: uv build && uv publish
      - name: Fetch gh-pages branch
        run: git fetch origin gh-pages:gh-pages || true
      - name: Publish Docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          uv run --group docs --all-extras python scripts/deploy_docs.py --push --update-aliases $VERSION latest

  github-release:
    needs: publish
    name: GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Extract release notes from changelog
        run: awk '/^## /{if(found) exit; found=1; next} found' docs/changelog.md > CHANGES.md
      - uses: softprops/action-gh-release@v2.5.0
        with:
          body_path: CHANGES.md
          tag_name: ${{ github.ref_name }}

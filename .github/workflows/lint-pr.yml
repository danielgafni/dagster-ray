name: Lint PR

on:
  pull_request_target:
    types: [opened, edited, reopened]

permissions:
  pull-requests: read

jobs:
  conventional-title:
    name: Conventional PR Title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            refactor
            perf
            test
            chore
            ci
            build
            style
